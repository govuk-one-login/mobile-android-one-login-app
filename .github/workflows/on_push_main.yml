# When making structure changes to the workflow, please ensure the quality-gate.manifest.json is updated accordingly to reflect this.
name: On Branch Push (main)

on:
  workflow_run:
    workflows: [ Run checks (tests and style checks) ]
    branches: [ main ]
    types: [ completed ]
  push:
    branches:
      - "main"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-up:
    name: Set-up and generate version name and version code
    runs-on: ubuntu-22.04
    outputs:
      version-code: ${{ steps.version-code.outputs.version-code }}
      version-name: ${{ steps.version-name.outputs.version-name }}

    steps:
      - name: Run checkout github action
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0

      - name: Get latest tag
        id: latest-tag
        uses: ./config/actions/get-latest-tag
        with:
          pattern: 'v*'

      - name: Get next version from last commit
        id: next-version
        uses: ./mobile-android-pipelines/actions/get-next-version-from-commit-message

      - name: Ensure version is correct
        id: version-number
        uses: ./config/actions/ensure-version-is-correct
        with:
          current-version: ${{ steps.latest-tag.outputs.current-tag }}
          next-version: ${{ steps.next-version.outputs.next-version }}

      - name: Display version jump
        run: |
          echo "Moving from $CURRENT_VERSION to $NEXT_VERSION"
        shell: bash
        env:
          CURRENT_VERSION: ${{ steps.latest-tag.outputs.current-tag }}
          NEXT_VERSION: ${{ steps.version-number.outputs.version }}

      - name: Push tag
        id: git-tag
        uses: ./config/actions/push-tag
        with:
          version-name: ${{ steps.version-number.outputs.version }}

      - name: Generate version code
        id: version-code
        uses: ./mobile-android-pipelines/actions/generate-version-code

      - name: Clean workspace
        uses: ./mobile-android-pipelines/actions/clean-workspace

  build-and-publish-release-integration:
    name: Verify code base when pushed on release
    needs: set-up
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        environment: [ "integration", "production" ]
    environment: release
    permissions:
      contents: write
      packages: read
      id-token: write
    steps:
      - name: Run checkout github action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: 'true'
          submodules: 'true'
          fetch-depth: 0

      - name: Setup GitHub Runner workflow
        uses: ./mobile-android-pipelines/actions/setup-runner

      - name: Clean runner
        uses: ./mobile-android-pipelines/actions/clean-runner-fast

      - name: Retrieve secrets
        id: retrieve-secrets
        uses: ./config/actions/retrieve-secrets
        with:
          actions-role-arn: ${{ secrets.GITHUBRUNNER_EC2_ACTIONS_ROLE_ARN }}

      - name: Generate version code
        id: version-code
        uses: ./mobile-android-pipelines/actions/generate-version-code

      - name: Bundle release
        id: bundle-release
        uses: ./config/actions/gradle-assemble-and-bundle
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          module-fetch-token: ${{ secrets.MODULE_FETCH_TOKEN }}
          flavors: ${{ matrix.environment }}
          github-actor: ${{ secrets.GITHUB_ACTOR }}
          module-fetch-token-username: ${{ secrets.MODULE_FETCH_TOKEN_USERNAME }}
          version-code: ${{ steps.version-code.outputs.version-code }}
          version-name: ${{ needs.prepare-for-release.outputs.version }}
          app-check-token: ${{ secrets.BUILD_APPCHECK_DEBUG_TOKEN }}
          keystore-file-path: ${{ steps.retrieve-secrets.outputs.keystore-file-path }}

      - name: Upload to play store
        uses: ./config/actions/upload-to-play-store
        with:
          aab-paths: ${{ steps.bundle-release.outputs.aab-paths }}

      - name: Git tag bundles
        uses: ./config/actions/git-tag-bundles
        with:
          aab-paths: ${{ steps.bundle-release.outputs.aab-paths }}
          version-code: ${{ steps.version-code.outputs.version-code }}
          version-name: ${{ needs.prepare-for-release.outputs.version }}

      - name: Clean workspace
        uses: ./mobile-android-pipelines/actions/clean-workspace
